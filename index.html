<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#20785a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="每日收支" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>每日收支</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260615-redesign" />
  </head>
  <body class="mobile-view-home mobile-chart-category">
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="modeLabel">本地记账</p>
          <h1>每日收支</h1>
        </div>
        <div class="top-actions">
          <button class="status-pill" id="cloudStatus" type="button">本地模式 · 未登录</button>
          <form class="auth-panel" id="authPanel">
            <input id="authEmail" type="email" placeholder="邮箱" autocomplete="email" />
            <input id="authPassword" type="password" minlength="6" placeholder="密码" autocomplete="current-password" />
            <button class="secondary-button" id="passwordLogin" type="button">密码登录</button>
            <button class="secondary-button" id="sendLogin" type="button">验证码备用</button>
            <input class="is-hidden" id="authCode" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="8 位验证码" />
            <button class="secondary-button is-hidden" id="verifyLogin" type="button">验证登录</button>
            <button class="secondary-button is-hidden" id="savePassword" type="button">设置/更改密码</button>
            <button class="plain-button is-hidden" id="signOut" type="button">退出</button>
          </form>
          <div class="month-switcher" aria-label="选择统计月份">
            <button class="icon-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
            <input id="monthPicker" type="month" />
            <button class="icon-button" id="nextMonth" type="button" aria-label="下个月">›</button>
          </div>
        </div>
      </header>

      <section class="notice sync-notice is-hidden" id="syncNotice" role="status">
        <span id="syncMessage"></span>
        <div class="notice-actions">
          <button class="secondary-button" id="migrateData" type="button">同步本地数据</button>
          <button class="plain-button" id="dismissMigration" type="button">稍后</button>
        </div>
      </section>
      <section class="notice is-hidden" id="budgetNotice" role="status"></section>

      <section class="summary-grid" aria-label="月度概览">
        <article class="metric spending-metric">
          <span>本月已花</span>
          <strong id="expenseTotal">¥0.00</strong>
        </article>
        <article class="metric budget-metric">
          <div class="metric-heading">
            <span>预算上限</span>
            <button class="plain-button" id="editBudget" type="button">设置</button>
          </div>
          <strong id="budgetValue">未设置</strong>
          <div class="progress-track" aria-label="预算使用比例">
            <span id="budgetProgress"></span>
          </div>
          <small id="budgetMeta">设置后将在 80% 时提醒</small>
        </article>
      </section>

      <section class="home-recent-panel">
        <div class="panel-title">
          <h2>最近记录</h2>
          <span id="homeRecordCount">0 笔</span>
        </div>
        <div class="records records--compact" id="homeRecentList"></div>
      </section>

      <section class="workspace">
        <form class="entry-panel" id="entryForm">
          <div class="panel-title">
            <h2>记一笔</h2>
          </div>

          <label class="amount-field">
            金额
            <div class="amount-control">
              <input id="amountInput" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required />
              <button class="voice-button" id="voiceInput" type="button" aria-label="语音录入">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 4a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V7a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="2" />
                  <path d="M6 11a6 6 0 0 0 12 0M12 17v3M9 20h6" stroke="currentColor" stroke-linecap="round" stroke-width="2" />
                </svg>
                <span id="voiceLabel">语音</span>
              </button>
            </div>
          </label>

          <div class="field-row">
            <label>
              分类
              <select id="categorySelect" required></select>
            </label>
            <button class="secondary-button" id="showCategoryForm" type="button">新增分类</button>
          </div>
          <div class="quick-category-list" id="quickCategoryList" aria-label="快捷分类"></div>

          <div class="inline-form is-hidden" id="categoryForm">
            <input id="categoryNameInput" type="text" maxlength="12" placeholder="分类名称" />
            <button class="icon-button" id="addCategory" type="button" aria-label="添加分类">＋</button>
          </div>

          <label>
            日期
            <input id="dateInput" type="date" required />
          </label>

          <label>
            备注
            <input id="noteInput" type="text" maxlength="40" placeholder="可选" />
          </label>

          <button class="primary-button" type="submit">保存</button>
        </form>

        <section class="analysis-panel">
          <div class="panel-title">
            <h2>统计分析</h2>
            <span id="recordCount">0 笔记录</span>
          </div>

          <div class="mobile-chart-tabs" role="tablist" aria-label="手机端统计视图">
            <button class="segment is-active" type="button" data-chart-tab="category">分类</button>
            <button class="segment" type="button" data-chart-tab="trend">趋势</button>
          </div>

          <div class="charts-grid">
            <article class="chart-block" data-chart-panel="category">
              <div class="block-heading">
                <h3>分类支出</h3>
                <span id="categoryHint">暂无支出</span>
              </div>
              <div class="donut-wrap">
                <div class="donut" id="categoryDonut" aria-hidden="true"></div>
                <ul class="legend" id="categoryLegend"></ul>
              </div>
            </article>

            <article class="chart-block" data-chart-panel="trend">
              <div class="block-heading">
                <h3>每日趋势</h3>
                <span id="trendHint">本月支出</span>
              </div>
              <div class="bar-chart" id="dailyTrend" aria-label="每日支出趋势"></div>
            </article>
          </div>
          <div class="insight-grid" aria-label="统计摘要">
            <article>
              <span>最大分类</span>
              <strong id="topCategoryInsight">暂无</strong>
            </article>
            <article>
              <span>日均支出</span>
              <strong id="avgDailyInsight">¥0.00</strong>
            </article>
          </div>
        </section>
      </section>

      <section class="list-panel">
        <div class="panel-title">
          <h2>收支明细</h2>
          <div class="list-actions">
            <button class="plain-button" id="exportData" type="button">导出</button>
            <button class="plain-button" id="importData" type="button">导入</button>
            <button class="plain-button danger" id="clearMonth" type="button">清空本月</button>
          </div>
        </div>
        <input class="visually-hidden" id="importFile" type="file" accept="application/json" />
        <div class="records" id="recordsList"></div>
      </section>
    </main>

    <dialog id="budgetDialog">
      <form method="dialog" class="dialog-body" id="budgetForm">
        <h2>设置月支出上限</h2>
        <label>
          上限金额
          <input id="budgetInput" type="number" inputmode="decimal" min="0" step="0.01" placeholder="例如 5000" />
        </label>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="button" id="closeBudget">取消</button>
          <button class="primary-button" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <button class="mobile-add-button" id="mobileAddRecord" type="button" aria-label="记一笔">＋</button>
    <div class="mobile-sheet-backdrop" id="mobileSheetBackdrop" aria-hidden="true"></div>
    <nav class="mobile-tabbar" aria-label="手机主导航">
      <button class="is-active" type="button" data-mobile-view="home" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-linejoin="round" />
        </svg>
        <span>首页</span>
      </button>
      <button type="button" data-mobile-view="record" aria-label="记录">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-linecap="round" />
        </svg>
        <span>记录</span>
      </button>
      <button type="button" data-mobile-view="stats" aria-label="统计">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 19V9M12 19V5M19 19v-7" stroke="currentColor" stroke-linecap="round" />
        </svg>
        <span>统计</span>
      </button>
    </nav>

    <script src="./config.js?v=20260615-redesign"></script>
    <script src="./app.js?v=20260615-redesign"></script>
    <script>
      window.addEventListener("load", () => {
        if (window.__dailyLedgerPasswordAuthReady) return;

        const panel = document.querySelector("#authPanel");
        const emailInput = document.querySelector("#authEmail");
        const passwordInput = document.querySelector("#authPassword");
        const passwordLogin = document.querySelector("#passwordLogin");
        const sendButton = document.querySelector("#sendLogin");
        const codeInput = document.querySelector("#authCode");
        const verifyButton = document.querySelector("#verifyLogin");
        const savePassword = document.querySelector("#savePassword");
        const signOut = document.querySelector("#signOut");
        const notice = document.querySelector("#syncNotice");
        const message = document.querySelector("#syncMessage");

        if (!panel || !emailInput || !passwordInput || !passwordLogin || !sendButton || !codeInput || !verifyButton || !savePassword) return;

        function getClient() {
          if (window.__dailyLedgerSupabaseClient) return window.__dailyLedgerSupabaseClient;
          if (!window.supabase?.createClient || !window.APP_CONFIG?.supabaseUrl || !window.APP_CONFIG?.supabaseAnonKey) return null;
          window.__dailyLedgerSupabaseClient = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseAnonKey, {
            auth: {
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: true,
              storageKey: "daily-ledger-supabase-auth",
            },
          });
          return window.__dailyLedgerSupabaseClient;
        }

        function showAuthMessage(text, kind = "info") {
          if (!notice || !message) return;
          message.textContent = text;
          notice.classList.remove("is-hidden", "is-success", "is-error");
          notice.classList.toggle("is-success", kind === "success");
          notice.classList.toggle("is-error", kind === "error");
        }

        function applyAuthUI(session) {
          const signedIn = Boolean(session);
          panel.classList.toggle("auth-panel--signed-in", signedIn);
          emailInput.classList.toggle("is-hidden", signedIn);
          passwordInput.classList.remove("is-hidden");
          passwordLogin.classList.toggle("is-hidden", signedIn);
          sendButton.classList.toggle("is-hidden", signedIn);
          codeInput.classList.toggle("is-hidden", signedIn || !codeInput.value);
          verifyButton.classList.toggle("is-hidden", signedIn || !codeInput.value);
          savePassword.classList.toggle("is-hidden", !signedIn);
          signOut?.classList.toggle("is-hidden", !signedIn);
          passwordInput.placeholder = signedIn ? "新密码（至少 6 位）" : "密码";
          passwordInput.autocomplete = signedIn ? "new-password" : "current-password";
        }

        async function refreshAuthUI() {
          const client = getClient();
          if (!client) return;
          const { data } = await client.auth.getSession();
          applyAuthUI(data?.session);
        }

        async function signInWithPassword(event) {
          event?.preventDefault();
          const client = getClient();
          const email = emailInput.value.trim();
          const password = passwordInput.value;
          if (!client) return showAuthMessage("云端配置还没加载好，请刷新后再试。", "error");
          if (!email) return emailInput.focus();
          if (!password || password.length < 6) return passwordInput.focus();

          passwordLogin.disabled = true;
          passwordLogin.textContent = "登录中";
          const { error } = await client.auth.signInWithPassword({ email, password });
          passwordLogin.disabled = false;
          passwordLogin.textContent = "密码登录";

          if (error) {
            const text = error.message === "Invalid login credentials" ? "登录失败：邮箱或密码不对。如果还没设置过密码，请先用验证码备用登录一次。" : `登录失败：${error.message}`;
            showAuthMessage(text, "error");
            return;
          }
          showAuthMessage("登录成功，正在同步云端数据。", "success");
          window.setTimeout(() => window.location.reload(), 500);
        }

        async function updatePassword(event) {
          event?.preventDefault();
          const client = getClient();
          const password = passwordInput.value;
          if (!client) return showAuthMessage("云端配置还没加载好，请刷新后再试。", "error");
          if (!password || password.length < 6) return passwordInput.focus();

          savePassword.disabled = true;
          savePassword.textContent = "保存中";
          const { error } = await client.auth.updateUser({ password });
          savePassword.disabled = false;
          savePassword.textContent = "设置/更改密码";

          if (error) return showAuthMessage(`密码设置失败：${error.message}`, "error");
          passwordInput.value = "";
          showAuthMessage("密码已设置好。以后可以直接用邮箱和密码登录。", "success");
        }

        async function sendCode(event) {
          event.preventDefault();
          event.stopImmediatePropagation();
          const client = getClient();
          const email = emailInput.value.trim();
          if (!client) return showAuthMessage("云端配置还没加载好，请刷新后再试。", "error");
          if (!email) return emailInput.focus();

          sendButton.disabled = true;
          sendButton.textContent = "发送中";
          const { error } = await client.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
          sendButton.disabled = false;
          sendButton.textContent = "验证码备用";

          if (error) return showAuthMessage(`验证码发送失败：${error.message}`, "error");
          codeInput.classList.remove("is-hidden");
          verifyButton.classList.remove("is-hidden");
          codeInput.value = "";
          codeInput.focus();
          showAuthMessage("验证码已发送，请输入邮件里的 8 位验证码。", "success");
        }

        async function verifyCode(event) {
          event?.preventDefault();
          event?.stopImmediatePropagation();
          const client = getClient();
          const email = emailInput.value.trim();
          const token = codeInput.value.trim();
          if (!client) return showAuthMessage("云端配置还没加载好，请刷新后再试。", "error");
          if (!email) return emailInput.focus();
          if (!token || token.length < 8) return codeInput.focus();

          verifyButton.disabled = true;
          verifyButton.textContent = "验证中";
          const { error } = await client.auth.verifyOtp({ email, token, type: "email" });
          verifyButton.disabled = false;
          verifyButton.textContent = "验证登录";

          if (error) return showAuthMessage(`登录失败：${error.message}`, "error");
          showAuthMessage("登录成功，正在同步云端数据。", "success");
          window.setTimeout(() => window.location.reload(), 500);
        }

        passwordLogin.addEventListener("click", signInWithPassword);
        savePassword.addEventListener("click", updatePassword);
        sendButton.addEventListener("click", sendCode, true);
        verifyButton.addEventListener("click", verifyCode, true);
        passwordInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            savePassword.classList.contains("is-hidden") ? signInWithPassword(event) : updatePassword(event);
          }
        });
        codeInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") verifyCode(event);
        });

        refreshAuthUI();
        getClient()?.auth.onAuthStateChange((_event, session) => applyAuthUI(session));
      });
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
            if (window.caches) {
              const keys = await caches.keys();
              await Promise.all(keys.filter((key) => key.startsWith("daily-ledger")).map((key) => caches.delete(key)));
            }
          } catch (error) {
            console.warn("Daily Ledger cache cleanup failed:", error);
          }
        });
      }
    </script>
  </body>
</html>
